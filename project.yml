name: SmartSleepAlarm
options:
  bundleIdPrefix: com.smartsleep
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
packages:
  SmartSleepCore:
    path: Packages/SmartSleepCore
targets:
  SmartSleepAlarm:
    type: application
    platform: iOS
    sources:
      - path: Apps/iOS/Sources
    dependencies:
      - package: SmartSleepCore
    info:
      path: Apps/iOS/Info.plist
      properties:
        CFBundleDisplayName: SmartSleep
        CFBundleShortVersionString: "0.2"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartsleep.alarm
        MARKETING_VERSION: "0.2"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  SmartSleepAlarmTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Apps/iOS/Tests
    dependencies:
      - target: SmartSleepAlarm
      - package: SmartSleepCore
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  SmartSleepWatch:
    type: application
    platform: watchOS
    sources:
      - path: Apps/Watch/Sources
    dependencies:
      - package: SmartSleepCore
    info:
      path: Apps/Watch/Info.plist
      properties:
        CFBundleDisplayName: SmartSleep
        CFBundleShortVersionString: "0.2"
        CFBundleVersion: "1"
        WKApplication: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartsleep.alarm.watch
        MARKETING_VERSION: "0.2"
        CURRENT_PROJECT_VERSION: "1"
